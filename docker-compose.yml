version: '3.8'

networks:
  data-network:
    driver: bridge

services:
  # --- KAFKA (KRaft mode) ---
  kafka:
    image: bitnamilegacy/kafka:3.7.0
    container_name: kafka-broker
    networks:
      - data-network
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - ./kafka_data:/bitnami/kafka
    ports:
      - "9092:9092"

  # --- SPARK MASTER ---
  spark-master:
    image: bitnamilegacy/spark:3.5.1     # Đã đổi từ build sang gọi thẳng image
    container_name: spark-master
    networks:
      - data-network
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "9090:8080"
      - "7077:7077"
    volumes:
      - ./data:/app/data
      - ./spark/code:/app/code           # Đã gỡ bỏ volume models

  # --- SPARK WORKER ---
  spark-worker:
    image: bitnamilegacy/spark:3.5.1     # Đã đổi từ build sang gọi thẳng image
    container_name: spark-worker
    networks:
      - data-network
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    depends_on:
      - spark-master
    volumes:
      - ./data:/app/data
      - ./spark/code:/app/code           # Đã gỡ bỏ volume models

  # --- REDIS (In-Memory Cache) ---
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    networks:
      - data-network
    ports:
      - "6379:6379"
    # Ép Redis làm Smart Cache: Cấp 2GB RAM, ưu tiên xóa file hết hot, không lưu đĩa.
    command: >
      redis-server 
      --maxmemory 2gb 
      --maxmemory-policy volatile-lru 
      --save "" 
      --appendonly no

  # --- AI WORKSPACE (Nơi huấn luyện & Điều phối) ---
  ai-server:
    build: ./ai-workspace
    container_name: ai-env
    networks:
      - data-network
    depends_on:                          # Bắt buộc chờ Kafka và Redis lên sóng trước
      - kafka
      - redis
    volumes:
      - ./ai-workspace:/app/ai-workspace
      - ./spark/code:/app/code
      - ./data:/app/data
      - ./models:/app/models             # AI Server là nơi duy nhất giữ volume models
    environment:
      - KAFKA_BROKER=kafka:9092
      - SPARK_MASTER=spark://spark-master:7077
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    stdin_open: true 
    tty: true
    command: /bin/bash