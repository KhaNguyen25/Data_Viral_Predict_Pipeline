version: '3.8'

networks:
  data-network:
    driver: bridge

services:
  # --- KAFKA (KRaft mode) ---
  kafka:
    image: bitnamilegacy/kafka:3.7.0
    container_name: kafka-broker
    networks:
      - data-network
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - ./kafka_data:/bitnami/kafka
    ports:
      - "9092:9092"

  # --- SPARK MASTER ---
  spark-master:
      build: 
        context: ./spark               # Chỉ định context build vào thư mục spark
        dockerfile: Dockerfile.spark   
      container_name: spark-master
      networks:
        - data-network
      environment:
        - SPARK_MODE=master
        - SPARK_RPC_AUTHENTICATION_ENABLED=no
        - SPARK_RPC_ENCRYPTION_ENABLED=no
        - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
        - SPARK_SSL_ENABLED=no
      ports:
        - "9090:8080"
        - "7077:7077"
      volumes:
        - ./data:/app/data
        - ./models:/app/models
        - ./spark/code:/app/code

  # --- SPARK WORKER ---
  spark-worker:
      build: 
        context: ./spark               # Chỉ định context build vào thư mục spark
        dockerfile: Dockerfile.spark   
      container_name: spark-worker
      networks:
        - data-network
      environment:
        - SPARK_MODE=worker
        - SPARK_MASTER_URL=spark://spark-master:7077
        - SPARK_WORKER_MEMORY=2G
        - SPARK_WORKER_CORES=2
        - SPARK_RPC_AUTHENTICATION_ENABLED=no
      depends_on:
        - spark-master
      volumes:
        - ./data:/app/data
        - ./models:/app/models
        - ./spark/code:/app/code

  # --- REDIS (In-Memory Cache) ---
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    networks:
      - data-network
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes

  # --- AI WORKSPACE (Nơi huấn luyện & Điều phối) ---
  ai-server:
      build: ./ai-workspace
      container_name: ai-env
      networks:
        - data-network
      volumes:
        - ./spark/code:/app/code       # TRỎ CHUẨN XÁC VÀO THƯ MỤC SPARK CỦA BẠN
        - ./data:/app/data
        - ./models:/app/models
      environment:
        - KAFKA_BROKER=kafka:9092
        - SPARK_MASTER=spark://spark-master:7077
      stdin_open: true 
      tty: true
      command: /bin/bash